<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Operacional</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1622;
    color: #fff;
}

/* HEADER */
.header {
    background: #020c1b;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.status-bar {
    background: #8b1c1c;
    text-align: center;
    padding: 5px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.card {
    flex: 1;
    background: #1f2a3a;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
}

.card h2 {
    margin: 0;
    font-size: 18px;
}

.card p {
    font-size: 32px;
    margin: 10px 0 0;
}

.green { color: #00ff88; }
.yellow { color: #ffd000; }
.red { color: #ff4d4d; }

/* TABELA */
.table-container {
    height: 500px;
    overflow: hidden;
    position: relative;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

thead {
    position: sticky;
    top: 0;
    background: #1f2a3a;
    z-index: 2;
}

th, td {
    padding: 10px;
    text-align: left;
    white-space: nowrap;
    border-bottom: 1px solid #333;
}

th:nth-child(1), td:nth-child(1) { width: 45%; }
th:nth-child(2), td:nth-child(2) { width: 15%; }
th:nth-child(3), td:nth-child(3) { width: 13%; }
th:nth-child(4), td:nth-child(4) { width: 13%; }
th:nth-child(5), td:nth-child(5) { width: 14%; }

tbody {
    display: block;
}

thead, tbody tr {
    display: table;
    width: 100%;
}

/* STATUS CORES */
.ok { color: #00ff88; }
.atencao { color: #ffd000; }
.critico { color: #ff4d4d; }

/* SCROLL AUTO */
.scroll {
    position: absolute;
    width: 100%;
    animation: scrollUp 30s linear infinite;
}

@keyframes scrollUp {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); }
}
</style>
</head>

<body>

<div class="header">📦 PAINEL OPERACIONAL</div>
<div class="status-bar" id="statusGeral">Carregando...</div>

<div class="cards">
    <div class="card"><h2>Estoque</h2><p id="estoque" class="green">0</p></div>
    <div class="card"><h2>Fila</h2><p id="fila" class="yellow">0</p></div>
    <div class="card"><h2>Backlog</h2><p id="backlog">0</p></div>
    <div class="card"><h2>Atrasos</h2><p id="atrasos" class="red">0</p></div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Status</th>
                <th>Fila</th>
                <th>Backlog</th>
                <th>Atrasos</th>
            </tr>
        </thead>
        <tbody id="tabela" class="scroll"></tbody>
    </table>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbya5HMpg-8JEHdbyfRAp7Czs5d0TPqsEISu3YjtAufL1B9wm2PDmALxzWrCgT-uATxa/exec";

async function carregar() {
    try {
        const res = await fetch(API);
        const data = await res.json();

        let estoque = 0, fila = 0, backlog = 0, atrasos = 0;

        let criticos = [];
        let outros = [];

        data.forEach(item => {
            estoque += item.estoque;
            fila += item.fila;
            backlog += item.backlog;
            atrasos += item.atrasos;

            let status = "ok";
            if (item.atrasos > 50) status = "critico";
            else if (item.atrasos > 10) status = "atencao";

            let row = `
                <tr>
                    <td>${item.produto}</td>
                    <td class="${status}">${status.toUpperCase()}</td>
                    <td>${item.fila}</td>
                    <td>${item.backlog}</td>
                    <td>${item.atrasos}</td>
                </tr>
            `;

            if (status === "critico") criticos.push(row);
            else outros.push(row);
        });

        document.getElementById("estoque").innerText = estoque;
        document.getElementById("fila").innerText = fila;
        document.getElementById("backlog").innerText = backlog;
        document.getElementById("atrasos").innerText = atrasos;

        let statusGeral = "OK";
        if (atrasos > 200) statusGeral = "CRÍTICO";
        else if (atrasos > 50) statusGeral = "ATENÇÃO";

        document.getElementById("statusGeral").innerText = "STATUS: " + statusGeral;

        document.getElementById("tabela").innerHTML =
            criticos.join("") + outros.join("") +
            criticos.join("") + outros.join(""); // loop infinito

    } catch (e) {
        console.error(e);
    }
}

/* atualização inteligente */
setInterval(carregar, 10000);

/* inicial */
carregar();
</script>

</body>
</html>
